spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://127.0.0.1:5432/db_passwords
    username: 'sa-password-service'
    password: 'P@ssw0rdP@ssw0rds'
  session:
    store-type: none
  flyway:
    enabled: true
    driver-class-name: org.postgresql.Driver
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
    schemas:
      - 'public'
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    default-property-inclusion: non_null
    serialization:
      fail-on-empty-beans: false
  security:
    oauth2:
      resource-server:
        jwt:
          issuer-uri: http://127.0.0.1:8080/mypass-manager/auth/
management:
  endpoint:
    health:
      group:
        database:
          show-components: always
          show-details: always
          include:
            - db
    shutdown:
      enabled: false
  endpoints:
    web:
      exposure:
        include:
          - 'health'
          - 'metrics'
          - 'info'
springdoc:
  swagger-ui:
    oauth2-redirect-url: http://127.0.0.1:8080/mypass-manager/passwords/swagger-ui/redirect
    csrf:
      enabled: false
